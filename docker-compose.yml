services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wyshcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - wyshcare-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wyshcare"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - backend/.env
    environment:
      # Override DATABASE_URL so the backend container reaches the postgres
      # service by its Docker Compose service name, not localhost.
      DATABASE_URL: postgresql://wyshcare_app:wyshcare_app@postgres:5432/wyshcare
      REDIS_URL: redis://redis:6379
    ports:
      - "30013:30013"
    volumes:
      - wyshcare-storage:/var/lib/wyshcare/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:30013/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    env_file:
      - frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  wyshcare-postgres:
  wyshcare-storage:
