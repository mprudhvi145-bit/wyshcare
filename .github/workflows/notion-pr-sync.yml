name: PR → Notion Roadmap Sync

on:
  pull_request:
    types: [opened, closed]

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-notion') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: PR Opened → Create roadmap item
        if: github.event.action == 'opened'
        run: node scripts/notion-sync.mjs pr-opened
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROADMAP_DB_ID: ${{ secrets.NOTION_ROADMAP_DB_ID }}
          NOTION_SPRINT_DB_ID: ${{ secrets.NOTION_SPRINT_DB_ID }}
          NOTION_BUG_DB_ID: ${{ secrets.NOTION_BUG_DB_ID }}

      - name: PR Merged → Mark roadmap item complete
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        run: node scripts/notion-sync.mjs pr-merged
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROADMAP_DB_ID: ${{ secrets.NOTION_ROADMAP_DB_ID }}
          NOTION_SPRINT_DB_ID: ${{ secrets.NOTION_SPRINT_DB_ID }}
          NOTION_BUG_DB_ID: ${{ secrets.NOTION_BUG_DB_ID }}
