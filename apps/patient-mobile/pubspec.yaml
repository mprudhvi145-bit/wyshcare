name: patient_mobile
description: WyshCare Patient — Flutter mobile app for healthcare consumers in India.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  local_auth: ^2.2.0
  supabase_flutter: ^2.8.0
  wyshcare_patient_sdk:
    path: ../../sdks/flutter_patient_sdk

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
