apiVersion: v1
kind: Service
metadata:
  name: wyshcare-backend
  namespace: wyshcare
spec:
  selector:
    app: wyshcare-backend
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: wyshcare-frontend
  namespace: wyshcare
spec:
  selector:
    app: wyshcare-frontend
  ports:
    - port: 3000
      targetPort: 3000
