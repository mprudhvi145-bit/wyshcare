apiVersion: apps/v1
kind: Deployment
metadata:
  name: wyshcare-backend
  namespace: wyshcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wyshcare-backend
  template:
    metadata:
      labels:
        app: wyshcare-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/wyshcare/backend:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: wyshcare-secrets
