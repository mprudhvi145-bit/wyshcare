apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wyshcare
  namespace: wyshcare
spec:
  rules:
    - host: app.wyshcare.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wyshcare-frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: wyshcare-backend
                port:
                  number: 3001
