  PORT: '3001'
  CORS_ORIGIN: 'https://wyshcare.app'
  OTEL_ENABLED: 'true'
  OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector.wyshcare.svc.cluster.local:4318'
