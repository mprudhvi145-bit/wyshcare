version: '3.8'

services:
  postgres-test:
    image: postgis/postgis:16-3.4-alpine
    container_name: wyshcare-postgres-test
    environment:
      POSTGRES_USER: wyshcare
      POSTGRES_PASSWORD: wyshcare_test
      POSTGRES_DB: wyshcare_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wyshcare -d wyshcare_test"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis-test:
    image: redis:7-alpine
    container_name: wyshcare-redis-test
    ports:
      - "6380:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
