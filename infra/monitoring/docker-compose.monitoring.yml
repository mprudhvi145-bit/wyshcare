## Purpose:
## Docker Compose configuration for Prometheus + Grafana + Alertmanager
## monitoring stack. Deploy alongside the main docker-compose.yml.
##
## Usage:
##   docker compose -f docker-compose.yml -f infra/monitoring/docker-compose.monitoring.yml up -d
