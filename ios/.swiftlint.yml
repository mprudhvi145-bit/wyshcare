type_body_length:
  warning: 500
  error: 1000

file_length:
  warning: 600
  error: 1200

function_body_length:
  warning: 100
  error: 200

cyclomatic_complexity:
  warning: 15
  error: 25

force_unwrapping:
  severity: error

implicitly_unwrapped_optional:
  severity: warning

indentation_width:
  severity: error
  value: 4

# ── Design System Enforcement Rules ──
# Every screen MUST use DS.Color, DS.Radius, DS.Space, DS.Shadow
# Hardcoded values outside DesignConstants.swift are rejected.

custom_rules:
  forbidden_direct_number_spacing:
    name: "Hardcoded spacing value"
    regex: '\.padding\((\d+(\.\d+)?)\)'
    match_kinds:
      - identifier
    message: "Use DS.Space constants instead of hardcoded padding values."
    severity: warning

  forbidden_direct_corner_radius:
    name: "Hardcoded corner radius"
    regex: 'cornerRadius\((12|20|28|32)\)'
    message: "Use DS.Radius constants instead of hardcoded corner radius."
    severity: warning

  forbidden_direct_shadow:
    name: "Direct .shadow() call"
    regex: '\.shadow\('
    message: "Use DS.Shadow constants via a shared component (PrimaryCard, GlassCard, etc.) instead of direct .shadow()."
    severity: warning

  forbidden_hex_color_outside_ds:
    name: "Hex color literal outside DesignConstants"
    regex: 'Color\(hex:\s*"[0-9A-Fa-f]{6}"\)'
    excluded: ".*(DesignConstants|Color\\+Hex)\\.swift"
    message: "Define new colors in DS.Color and reference them via DS.Color, not inline hex literals."
    severity: error
